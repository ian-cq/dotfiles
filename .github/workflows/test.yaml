# .github/workflows/test.yaml
# Runs the real two-step onboarding (prereqs -> install -> verify) on a clean
# macOS runner and a clean Ubuntu runner. This is how the macOS path gets tested
# — macOS cannot be containerised, so we use GitHub's macOS VMs.
name: Onboarding (macOS + Ubuntu)

on:
  push:
    branches: [staging]
  pull_request:
  workflow_dispatch:

jobs:
  onboard:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # `install` looks for the repo at ~/dotfiles; point it at this checkout so
      # it builds the PR code (FORCE_SOURCE_BUILD) instead of cloning main.
      - name: Link checkout to ~/dotfiles
        run: |
          [ -e "$HOME/dotfiles" ] || ln -s "$GITHUB_WORKSPACE" "$HOME/dotfiles"

      # On macOS, prereqs.sh skips Homebrew under SKIP_BREW, so install stow here.
      - name: Install stow (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install stow

      - name: Vet
        run: go vet ./...

      # SKIP_BREW  -> validate symlinks/shell without a full brew bundle
      # FORCE_SOURCE_BUILD -> build setup_quanianitis from this checkout
      - name: Onboard + verify
        run: cd "$HOME/dotfiles" && bash test/onboard-and-verify.sh
        env:
          SKIP_BREW: "1"
          FORCE_SOURCE_BUILD: "1"
