# .github/workflows/release.yaml
name: Release setup_quanianitis

on:
  release:
    types: [published]

permissions:
    contents: write
    packages: write

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
    - uses: actions/checkout@v4
    - uses: wangyoucao577/go-release-action@v1
      with:
        # Use the workflow-scoped GITHUB_TOKEN instead of a PAT: the PAT was
        # returning 401 Bad Credentials (expired / missing scope). The built-in
        # token is granted `contents: write` above, which is all this action
        # needs to upload release assets, and it never expires.
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        binary_name: "setup_quanianitis"
