# gpg-agent.conf — passphrase caching for signed commits.
#
# On macOS: pinentry-mac routes prompts to a native GUI dialog with a
# "Save in Keychain" checkbox. Tick it once and the passphrase lives in
# the login Keychain; gpg-agent then never prompts again (within TTL) and
# silently re-fetches from Keychain when the TTL expires.
#
# On Linux: this file is not stowed; the system pinentry (curses/gtk) is
# used and TTLs apply the same way.
#
# After editing, reload with: gpgconf --kill gpg-agent

pinentry-program /opt/homebrew/bin/pinentry-mac

# Cache the passphrase for 8 hours after each use; hard ceiling of 24h.
# Long enough for a work day; short enough that a stolen unlocked laptop
# doesn't sign forever.
default-cache-ttl 28800
max-cache-ttl     86400
